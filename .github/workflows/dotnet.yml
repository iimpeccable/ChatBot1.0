name: .NET Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore "ChatBot 1.0.csproj"

    - name: Build project
      run: dotnet build "ChatBot 1.0.csproj" --configuration Release --no-restore

    - name: Run tests
      run: dotnet test "ChatBot 1.0.csproj" --no-build --verbosity normal
