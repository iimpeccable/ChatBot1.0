name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest   # Use Windows runner for SoundPlayer compatibility

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'   # Match your project’s target framework

    - name: Restore dependencies
      run: dotnet restore ./MyProject.sln

    - name: Build project
      run: dotnet build ./MyProject.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test ./MyProject.sln --no-build --verbosity normal
